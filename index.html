<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Administrativo - Bootstrap 5</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- 3. Componentes: Navbar con menú desplegable -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark custom-navbar">
        <div class="container-fluid">
            <!-- Toggler para Sidebar en móviles -->
            <button class="navbar-toggler d-md-none me-2 border-0" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <a class="navbar-brand" href="#">AdminPanel</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarDash"
                aria-controls="navbarDash" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarDash">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Inicio</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarUserDropdown" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false">
                            Mi Cuenta
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarUserDropdown">
                            <li><a class="dropdown-item" href="#">Perfil</a></li>
                            <li><a class="dropdown-item" href="#">Ajustes</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#">Salir</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 1. Sistema de Rejillas (Grid System): Dashboard Administrativo -->
    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar (Barra Lateral como Offcanvas en móviles) -->
            <div class="offcanvas-md offcanvas-start bg-light border-end col-md-3 col-lg-2 p-0 shadow-sm" tabindex="-1"
                id="sidebarMenu" aria-labelledby="sidebarMenuLabel">
                <div class="offcanvas-header d-md-none border-bottom px-3">
                    <h5 class="offcanvas-title" id="sidebarMenuLabel">Menú</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu"
                        aria-label="Close"></button>
                </div>
                <div class="offcanvas-body d-md-flex flex-column p-0 pt-md-3">
                    <ul class="nav flex-column nav-pills w-100" id="v-pills-tab" role="tablist"
                        aria-orientation="vertical">
                        <li class="nav-item">
                            <button class="nav-link active text-start rounded-0 py-3 px-4" id="v-pills-1-tab"
                                data-bs-toggle="pill" data-bs-target="#v-pills-1" type="button" role="tab"
                                aria-controls="v-pills-1" aria-selected="true" data-bs-dismiss="offcanvas"
                                data-bs-target="#sidebarMenu">
                                <span class="fw-bold">1</span>
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link text-start rounded-0 py-3 px-4" id="v-pills-2-tab"
                                data-bs-toggle="pill" data-bs-target="#v-pills-2" type="button" role="tab"
                                aria-controls="v-pills-2" aria-selected="false" data-bs-dismiss="offcanvas"
                                data-bs-target="#sidebarMenu">
                                <span class="fw-bold">2</span>
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link text-start rounded-0 py-3 px-4" id="v-pills-3-tab"
                                data-bs-toggle="pill" data-bs-target="#v-pills-3" type="button" role="tab"
                                aria-controls="v-pills-3" aria-selected="false" data-bs-dismiss="offcanvas"
                                data-bs-target="#sidebarMenu">
                                <span class="fw-bold">3</span>
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link text-start rounded-0 py-3 px-4" id="v-pills-4-tab"
                                data-bs-toggle="pill" data-bs-target="#v-pills-4" type="button" role="tab"
                                aria-controls="v-pills-4" aria-selected="false" data-bs-dismiss="offcanvas"
                                data-bs-target="#sidebarMenu">
                                <span class="fw-bold">4</span>
                            </button>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Área de Contenido Principal -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                <div
                    class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-4 pb-2 mb-4 border-bottom">
                    <h1 class="h2 custom-heading">Programacion WEB II</h1>
                </div>

                <div class="tab-content" id="v-pills-tabContent">
                    <!-- Sección 1: Formulario -->
                    <div class="tab-pane fade show active" id="v-pills-1" role="tabpanel"
                        aria-labelledby="v-pills-1-tab">
                        <div class="d-flex justify-content-center align-items-center bg-light rounded"
                            style="min-height: 400px;">
                            <h1 class="display-1 fw-bold text-muted">1</h1>
                        </div>
                    </div>

                    <!-- Sección 2 -->
                    <div class="tab-pane fade" id="v-pills-2" role="tabpanel" aria-labelledby="v-pills-2-tab">
                        <div class="d-flex justify-content-center align-items-center bg-light rounded"
                            style="min-height: 400px;">
                            <h1 class="display-1 fw-bold text-muted">2</h1>
                        </div>
                    </div>

                    <!-- Sección 3 -->
                    <div class="tab-pane fade" id="v-pills-3" role="tabpanel" aria-labelledby="v-pills-3-tab">
                        <div class="d-flex justify-content-center align-items-center bg-light rounded"
                            style="min-height: 400px;">
                            <h1 class="display-1 fw-bold text-muted">3</h1>
                        </div>
                    </div>

                    <!-- Sección 4 -->
                    <div class="tab-pane fade" id="v-pills-4" role="tabpanel" aria-labelledby="v-pills-4-tab">
                        <div class="d-flex justify-content-center align-items-center bg-light rounded"
                            style="min-height: 400px;">
                            <h1 class="display-1 fw-bold text-muted">4</h1>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
