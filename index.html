<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Administrativo - Bootstrap 5</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- 3. Componentes: Navbar con menú desplegable -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark custom-navbar">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">AdminPanel</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarDash"
                aria-controls="navbarDash" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarDash">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Inicio</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarUserDropdown" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false">
                            Mi Cuenta
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarUserDropdown">
                            <li><a class="dropdown-item" href="#">Perfil</a></li>
                            <li><a class="dropdown-item" href="#">Ajustes</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#">Salir</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 1. Sistema de Rejillas (Grid System): Dashboard Administrativo -->
    <div class="container-fluid">
        <div class="row layout-wrapper">

            <!-- Sidebar (Barra Lateral) -->
            <!-- 2. Asegurar que el Sidebar se oculte en móviles (combinación de clase Bootstrap y CSS) -->
            <nav id="sidebar" class="col-md-3 col-lg-2 d-none d-md-block bg-light sidebar custom-sidebar">
                <div class="position-sticky pt-3 mt-4">
                    <div class="nav flex-column nav-pills" id="v-pills-tab" role="tablist" aria-orientation="vertical">
                        <button class="nav-link active text-start" id="v-pills-1-tab" data-bs-toggle="pill"
                            data-bs-target="#v-pills-1" type="button" role="tab" aria-controls="v-pills-1"
                            aria-selected="true">
                            1
                        </button>
                        <button class="nav-link text-start" id="v-pills-2-tab" data-bs-toggle="pill"
                            data-bs-target="#v-pills-2" type="button" role="tab" aria-controls="v-pills-2"
                            aria-selected="false">
                            2
                        </button>
                        <button class="nav-link text-start" id="v-pills-3-tab" data-bs-toggle="pill"
                            data-bs-target="#v-pills-3" type="button" role="tab" aria-controls="v-pills-3"
                            aria-selected="false">
                            3
                        </button>
                        <button class="nav-link text-start" id="v-pills-4-tab" data-bs-toggle="pill"
                            data-bs-target="#v-pills-4" type="button" role="tab" aria-controls="v-pills-4"
                            aria-selected="false">
                            4
                        </button>
                    </div>
                </div>
            </nav>

            <!-- Área de Contenido Principal -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                <div
                    class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-4 pb-2 mb-4 border-bottom">
                    <h1 class="h2 custom-heading">Programacion WEB II</h1>
                </div>

                <div class="tab-content" id="v-pills-tabContent">
                    <!-- Sección 1: Formulario -->
                    <div class="tab-pane fade show active" id="v-pills-1" role="tabpanel"
                        aria-labelledby="v-pills-1-tab">
                        <div class="d-flex justify-content-center align-items-center bg-light rounded"
                            style="min-height: 400px;">
                            <h1 class="display-1 fw-bold text-muted">1</h1>
                        </div>
                    </div>

                    <!-- Sección 2 -->
                    <div class="tab-pane fade" id="v-pills-2" role="tabpanel" aria-labelledby="v-pills-2-tab">
                        <div class="d-flex justify-content-center align-items-center bg-light rounded"
                            style="min-height: 400px;">
                            <h1 class="display-1 fw-bold text-muted">2</h1>
                        </div>
                    </div>

                    <!-- Sección 3 -->
                    <div class="tab-pane fade" id="v-pills-3" role="tabpanel" aria-labelledby="v-pills-3-tab">
                        <div class="d-flex justify-content-center align-items-center bg-light rounded"
                            style="min-height: 400px;">
                            <h1 class="display-1 fw-bold text-muted">3</h1>
                        </div>
                    </div>

                    <!-- Sección 4 -->
                    <div class="tab-pane fade" id="v-pills-4" role="tabpanel" aria-labelledby="v-pills-4-tab">
                        <div class="d-flex justify-content-center align-items-center bg-light rounded"
                            style="min-height: 400px;">
                            <h1 class="display-1 fw-bold text-muted">4</h1>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
